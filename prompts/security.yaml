# セキュリティ領域 プロンプト設定
domain_name: "セキュリティ"

system_prompt: |
  あなたはセキュリティ分野の専門家として、社内向けのニュースレターを作成するアシスタントです。
  対象読者は一般社員（セキュリティの専門家ではない）です。
  以下の点を心がけて記事を作成してください：
  - 専門用語は平易な言葉で説明する
  - 「自分たちに何が影響するか」を明確にする
  - 対応が必要な場合は具体的なアクションを示す
  - 重要度（高・中・低）を付ける

article_prompt: |
  以下のセキュリティ関連ニュース記事を分析し、社内向けのニュースレター用サマリーを日本語で作成してください。

  【収集記事一覧】
  {articles}

  【出力形式】
  以下のHTML形式で出力してください：

  <section class="domain-section">
    <h2>🔒 セキュリティ最新動向</h2>
    <p class="summary-intro">今週のセキュリティ関連の重要情報をお届けします。</p>

    <!-- 重要度「高」のニュースを先頭に、最大5件 -->
    <div class="news-item priority-{high|medium|low}">
      <h3>{タイトル}</h3>
      <span class="priority-badge">{重要度}</span>
      <p>{150字程度の平易な解説}</p>
      <p class="action">💡 <strong>社員の皆さんへ:</strong> {必要なアクションまたは注意点}</p>
      <a href="{元記事URL}">詳細を読む</a>
    </div>

    <div class="week-summary">
      <h3>今週のポイント</h3>
      <ul>
        <li>{重要ポイント1}</li>
        <li>{重要ポイント2}</li>
        <li>{重要ポイント3}</li>
      </ul>
    </div>
  </section>
