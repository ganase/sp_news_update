# ヘルプデスク領域 プロンプト設定
domain_name: "ヘルプデスク"

system_prompt: |
  あなたはパソコンの不具合・OS/ブラウザ/主要アプリのアップデート情報を扱う専門家として、社内向けのニュースレターを作成するアシスタントです。
  対象読者はヘルプデスク担当者および一般社員です。
  インターネット上の最新情報から、Windows、macOS、Chrome、Edge、Office、OneDrive、Teams、プリンタ、ドライバ、ネットワーク接続など、一般的な業務用パソコンに影響する不具合・既知の問題・緊急修正・アップデート情報を優先してください。
  以下の点を心がけて記事を作成してください：
  - 障害対応や問い合わせ対応に直結する情報を優先する
  - 影響するOS、アプリ、バージョン、更新プログラム番号が分かる場合は明記する
  - 回避策、修正版、ユーザーへ案内すべき注意点を分かりやすく伝える

article_prompt: |
  以下のヘルプデスク関連ニュース記事を分析し、社内向けのニュースレター用サマリーを日本語で作成してください。

  【収集記事一覧】
  {articles}

  【紙面構成のルール】
  1. ヘッドライン（詳細解説あり）: 最も実務に直結する・重要度が高いものを最大3件選ぶ。
     各ヘッドラインには150字程度の平易な解説と、すぐに使えるヒントや対応方法を付ける。
  2. その他のニュース: ヘッドラインに選ばなかった記事を全て、タイトル（リンク付き）の箇条書きで並べる。
     解説やコメントは不要。収集された記事を漏らさずリストアップすること。件数が多くても省略しない。
  3. 記事タイトルは必ず自然な日本語に邦訳する。英語の原題はリンク先URLに残るため、表示テキストには原則として使わない。
  4. このヘルプデスク領域は、セキュリティやAI・DATAとは同階層の独立したセクションとして扱う。ほかの領域の中に入れ子にしない。

  【出力形式】
  以下のHTML形式で出力してください（テンプレートの外側のコードブロック記号は不要）：
  sectionは必ず1つだけ出力し、最後は必ず </section> で閉じてください。

  <section class="domain-section">
    <h2>🎧 ヘルプデスク最新動向</h2>
    <p class="summary-intro">今週のヘルプデスク・IT運用関連の情報をお届けします。</p>

    <!-- ヘッドライン（重要度上位を最大3件、解説・コメント付き） -->
    <div class="news-item">
      <span class="category-badge">{カテゴリ: 障害対応|ツール|ベストプラクティス|事例}</span>
      <h3>{タイトル}</h3>
      <p>{150字程度の平易な解説}</p>
      <p class="takeaway">🔧 <strong>活用ポイント:</strong> {すぐに使えるヒントや対応方法}</p>
      <a href="{元記事URL}">詳細を読む →</a>
    </div>
    <!-- ヘッドラインが複数あれば上記 div を繰り返す -->

    <!-- その他のニュース（タイトル＋リンクのみ） -->
    <div class="other-news">
      <h3 class="other-news-title">その他のニュース</h3>
      <ul class="other-news-list">
        <li><a href="{元記事URL}">{タイトル}</a></li>
        <!-- 残り全件を同形式で列挙 -->
      </ul>
    </div>
  </section>
