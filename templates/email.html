<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      color: #333;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background-color: #ffffff;
    }
    .header {
      background: linear-gradient(135deg, #bf0000 0%, #8b0000 100%);
      color: white;
      padding: 24px 32px;
      text-align: center;
    }
    .header h1 {
      margin: 0 0 4px 0;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .header .subtitle {
      margin: 0;
      font-size: 13px;
      opacity: 0.85;
    }
    .header .issue-date {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.75;
    }
    .content {
      padding: 24px 32px;
    }
    .intro-box {
      background: #fff8f0;
      border-left: 4px solid #bf0000;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #555;
    }
    /* ドメインセクション */
    .domain-section {
      margin-bottom: 32px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }
    .domain-section h2 {
      background-color: #cc0000;
      border-bottom: none;
      margin: 0;
      padding: 14px 20px;
      font-size: 17px;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 1px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .summary-intro {
      padding: 12px 20px 0;
      font-size: 13px;
      color: #666;
      margin: 0;
    }
    /* ニュースアイテム */
    .news-item {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .news-item:last-of-type {
      border-bottom: none;
    }
    .news-item h3 {
      margin: 0 0 6px 0;
      font-size: 15px;
      color: #1a1a1a;
    }
    .news-item p {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.65;
      color: #444;
    }
    .news-item a {
      font-size: 12px;
      color: #bf0000;
      text-decoration: none;
    }
    .news-item a:hover {
      text-decoration: underline;
    }
    /* バッジ */
    .priority-badge, .category-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .priority-high, .priority-badge[data-level="高"] {
      background-color: #ffe0e0;
      color: #c00;
    }
    .priority-medium, .priority-badge[data-level="中"] {
      background-color: #fff3cd;
      color: #856404;
    }
    .priority-low, .priority-badge[data-level="低"] {
      background-color: #e0f0e0;
      color: #155724;
    }
    .category-badge {
      background-color: #e8f0fe;
      color: #1a56db;
    }
    /* 高優先度 */
    .news-item.priority-high {
      background-color: #fffafa;
      border-left: 3px solid #cc0000;
    }
    /* アクション・示唆 */
    .action, .business-impact, .takeaway {
      background-color: #f0f7ff;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 13px;
      color: #333;
    }
    /* 週のポイント */
    .week-summary {
      background-color: #fafafa;
      border-top: 1px solid #eee;
      padding: 14px 20px;
    }
    .week-summary h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #555;
    }
    .week-summary ul {
      margin: 0;
      padding-left: 18px;
    }
    .week-summary li {
      font-size: 13px;
      color: #444;
      margin-bottom: 4px;
      line-height: 1.5;
    }
    /* その他のニュース（リスト表示） */
    .other-news {
      padding: 14px 20px 16px;
      background-color: #fafafa;
      border-top: 1px solid #f0f0f0;
    }
    .other-news-title {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: bold;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .other-news-list {
      margin: 0;
      padding-left: 18px;
    }
    .other-news-list li {
      font-size: 13px;
      color: #444;
      margin-bottom: 4px;
      line-height: 1.5;
    }
    .other-news-list li a {
      font-size: 13px;
      color: #333;
      text-decoration: none;
    }
    .other-news-list li a:hover {
      color: #bf0000;
      text-decoration: underline;
    }
    /* フッター */
    .footer {
      background-color: #f0f0f0;
      padding: 20px 32px;
      text-align: center;
      font-size: 11px;
      color: #888;
      border-top: 1px solid #ddd;
    }
    .footer a {
      color: #888;
    }
    .no-articles {
      padding: 20px;
      color: #999;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SP News Update</h1>
      <p class="subtitle">専門領域の最新動向を、わかりやすくお届けします</p>
      <p class="issue-date">{{issue_date}} 号</p>
    </div>

    <div class="content">
      <div class="intro-box">
        このメールはSP News Updateシステムによって自動配信されています。
        各記事の詳細は元記事リンクからご確認ください。
      </div>

      {{domain_sections}}

    </div>

    <div class="footer">
      <p>© {{year}} Rakuten Group | SP News Update</p>
      <p>配信停止・問い合わせ: <a href="mailto:{{from_address}}">{{from_address}}</a></p>
      <p>このメールはシステムにより自動生成されています。内容は参考情報としてご利用ください。</p>
    </div>
  </div>
</body>
</html>
